<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>価値観診断 — 2つの自分を比べる</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#fef9f2;
  --sf:#ffffff;
  --s2:#fff5e6;
  --bd:#f0e4d0;
  /* 視点1 = コーラルオレンジ */
  --g:#e8622a;--gl:#fff0ea;--gd:#c44d1a;
  /* 視点2 = スカイブルー */
  --b:#2a9ee8;--bl:#e8f5ff;--bd2:#1a80c4;
  /* アクセント = 黄色 */
  --y:#f5c842;--yl:#fffbe6;
  /* テキスト */
  --tx:#2d1f0e;--mu:#9a7d5a;
  /* エラー系 */
  --dn:#e8622a;--dl:#fff0ea;
  --wn:#b8860b;--wl:#fffbe6;
  --p:#9b59b6;--pl:#f5eefb;
  /* シャドウ */
  --sh:0 4px 20px rgba(232,98,42,.15);
  --sh2:0 4px 20px rgba(42,158,232,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);color:var(--tx);
  font-family:'M PLUS Rounded 1c',sans-serif;
  min-height:100vh;font-size:15px;line-height:1.7;
  position:relative;overflow-x:hidden;
}

/* ── 背景デコ ── */
body::before,body::after{
  content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;
}
body::before{
  width:600px;height:600px;top:-200px;right:-200px;
  background:radial-gradient(circle,rgba(245,200,66,.18) 0%,transparent 70%);
}
body::after{
  width:500px;height:500px;bottom:-150px;left:-150px;
  background:radial-gradient(circle,rgba(42,158,232,.12) 0%,transparent 70%);
}

.wrap{max-width:720px;margin:0 auto;padding:40px 20px 100px;position:relative;z-index:1}

/* ── TOP ── */
.top{text-align:center;margin-bottom:36px;animation:pop .6s cubic-bezier(.34,1.56,.64,1) both}
.badge{
  display:inline-block;
  background:linear-gradient(135deg,var(--g),#f5a623);
  color:#fff;font-size:12px;font-weight:800;letter-spacing:1px;
  padding:6px 18px;border-radius:100px;margin-bottom:16px;
  box-shadow:0 3px 12px rgba(232,98,42,.4);
}
.top h1{
  font-size:clamp(22px,5vw,36px);font-weight:800;line-height:1.35;margin-bottom:12px;
  background:linear-gradient(135deg,var(--g),#f5a623,var(--b));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.top p{color:var(--mu);font-size:14px;line-height:1.9;max-width:480px;margin:0 auto 20px}
.ipts{
  background:var(--sf);border:2px solid var(--bd);border-radius:20px;
  padding:18px 22px;margin-bottom:20px;text-align:left;
  display:flex;flex-direction:column;gap:9px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.ipt{display:flex;gap:10px;font-size:13px;color:var(--mu);line-height:1.65;align-items:flex-start}
.ipt span:first-child{flex-shrink:0;font-size:16px;margin-top:1px}

/* context selection */
.ctx-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:20px}
@media(max-width:500px){.ctx-grid{grid-template-columns:1fr}}
.ctx-card{
  background:var(--sf);border:3px solid var(--bd);border-radius:22px;padding:18px;
  transition:all .2s;
}
.cc1{border-color:rgba(232,98,42,.25)}
.cc2{border-color:rgba(42,158,232,.25)}
.ctx-card-hd{
  font-size:12px;font-weight:800;margin-bottom:12px;
  display:flex;align-items:center;gap:7px;letter-spacing:.5px;
}
.cc1 .ctx-card-hd{color:var(--g)}
.cc2 .ctx-card-hd{color:var(--b)}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.d1{background:var(--g)}.d2{background:var(--b)}
.ctx-opts{display:flex;flex-direction:column;gap:6px}
.ctx-btn{
  padding:10px 13px;border:2px solid var(--bd);border-radius:12px;
  background:var(--bg);cursor:pointer;text-align:left;
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;
  color:var(--tx);line-height:1.45;transition:all .15s;font-weight:700;
}
.ctx-btn:hover{transform:translateY(-1px)}
.cc1 .ctx-btn:hover{border-color:var(--g);background:var(--gl);box-shadow:var(--sh)}
.cc2 .ctx-btn:hover{border-color:var(--b);background:var(--bl);box-shadow:var(--sh2)}
.cc1 .ctx-btn.sl{border-color:var(--g);background:var(--gl);color:var(--g);box-shadow:var(--sh)}
.cc2 .ctx-btn.sl{border-color:var(--b);background:var(--bl);color:var(--b);box-shadow:var(--sh2)}

.start-btn{
  display:block;width:100%;padding:17px;
  background:linear-gradient(135deg,var(--g),#f5a623);
  color:#fff;border:none;border-radius:16px;
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:16px;font-weight:800;
  cursor:pointer;transition:all .2s;
  box-shadow:0 6px 20px rgba(232,98,42,.4);letter-spacing:.5px;
}
.start-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(232,98,42,.5)}
.start-btn:active{transform:translateY(0)}
.start-btn:disabled{
  background:linear-gradient(135deg,#d0c4b8,#c8bfb0);
  color:#a09080;cursor:not-allowed;transform:none;
  box-shadow:none;
}

/* ── QUIZ ── */
.prog-w{margin-bottom:24px}
.prog-meta{display:flex;justify-content:space-between;margin-bottom:8px}
.prog-lbl{font-size:13px;font-weight:800;color:var(--g)}
.prog-pct{font-size:13px;color:var(--mu);font-weight:700}
.prog-bar{height:10px;background:var(--bd);border-radius:10px;overflow:hidden}
.prog-fill{
  height:100%;
  background:linear-gradient(90deg,var(--g),#f5a623,var(--b));
  border-radius:10px;transition:width .5s cubic-bezier(.4,0,.2,1);
}

.qcard{
  background:var(--sf);border:2px solid var(--bd);border-radius:24px;
  padding:28px;margin-bottom:14px;animation:pop .4s cubic-bezier(.34,1.56,.64,1) both;
  box-shadow:0 4px 20px rgba(0,0,0,.07);
}
.qcat{
  display:inline-block;font-size:11px;font-weight:800;letter-spacing:1px;
  text-transform:uppercase;margin-bottom:14px;
  background:var(--bl);color:var(--b);padding:4px 12px;border-radius:100px;
}
.qtxt{font-size:16px;line-height:1.8;color:var(--tx);font-weight:800;margin-bottom:10px}
.qnote{
  font-size:13px;color:var(--mu);line-height:1.7;margin-bottom:18px;
  padding:10px 14px;background:var(--yl);border-radius:12px;
  border-left:4px solid var(--y);
}

.dual{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}
@media(max-width:500px){.dual{grid-template-columns:1fr}}
.ab{border-radius:18px;overflow:hidden;border:2px solid var(--bd)}
.ab-hd{padding:10px 14px;font-size:12px;font-weight:800;display:flex;align-items:center;gap:6px;letter-spacing:.5px}
.ab1 .ab-hd{background:var(--gl);color:var(--g)}
.ab2 .ab-hd{background:var(--bl);color:var(--b)}
.ab1{border-color:rgba(232,98,42,.3)}
.ab2{border-color:rgba(42,158,232,.3)}

.ao{
  background:var(--sf);border:none;border-top:1px solid var(--bd);
  padding:11px 14px;cursor:pointer;text-align:left;color:var(--tx);
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:13px;
  line-height:1.6;transition:all .15s;display:flex;gap:8px;
  align-items:flex-start;width:100%;font-weight:500;
}
.ao:first-child{border-top:none}
.ao:hover{background:var(--s2)}
.ab1 .ao.sl{background:var(--gl);color:var(--g);font-weight:700}
.ab2 .ao.sl{background:var(--bl);color:var(--b);font-weight:700}
.aok{
  flex-shrink:0;width:20px;height:20px;border-radius:8px;
  background:var(--bd);color:var(--mu);font-size:10px;font-weight:800;
  display:flex;align-items:center;justify-content:center;margin-top:2px;
  font-family:'DM Mono',monospace;transition:all .2s;
}
.ab1 .ao.sl .aok{background:var(--g);color:#fff;border-radius:8px}
.ab2 .ao.sl .aok{background:var(--b);color:#fff;border-radius:8px}

.q-st{display:flex;justify-content:center;gap:14px;margin:10px 0 6px;font-size:12px;color:var(--mu);font-weight:700}
.qsd{display:flex;align-items:center;gap:5px}
.qsd .sd{width:8px;height:8px;border-radius:50%;background:var(--bd);transition:all .2s}
.qsd.d1ok .sd{background:var(--g);box-shadow:0 0 0 3px var(--gl)}
.qsd.d2ok .sd{background:var(--b);box-shadow:0 0 0 3px var(--bl)}
.skip-n{font-size:12px;color:var(--mu);text-align:center;margin-top:6px}
.skip-l{color:var(--b);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:'M PLUS Rounded 1c',sans-serif;font-size:12px;font-weight:700}

.nav{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px}
.btn{
  font-family:'M PLUS Rounded 1c',sans-serif;font-size:14px;font-weight:800;
  padding:12px 24px;cursor:pointer;border-radius:14px;transition:all .2s;border:2px solid;
}
.bn{background:linear-gradient(135deg,var(--g),#f5a623);color:#fff;border-color:transparent;box-shadow:0 4px 14px rgba(232,98,42,.4)}
.bn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(232,98,42,.5)}
.bn:disabled{background:linear-gradient(135deg,#d0c4b8,#c8bfb0);color:#a09080;border-color:transparent;box-shadow:none;cursor:not-allowed;transform:none}
.bb{background:transparent;color:var(--mu);border-color:var(--bd)}
.bb:hover{color:var(--tx);border-color:var(--tx);background:var(--sf)}
.qctr{font-size:13px;color:var(--mu);font-weight:700}

/* ── LOADING ── */
.loading{text-align:center;padding:80px 0}
.ldots{display:flex;justify-content:center;gap:10px;margin-bottom:24px}
.ldots span{
  width:14px;height:14px;border-radius:50%;
  animation:bounce2 1.2s ease infinite;
}
.ldots span:nth-child(1){background:var(--g);animation-delay:0s}
.ldots span:nth-child(2){background:var(--y);animation-delay:.2s}
.ldots span:nth-child(3){background:var(--b);animation-delay:.4s}
.loading h3{font-size:18px;font-weight:800;margin-bottom:8px}
.loading p{color:var(--mu);font-size:14px}

/* ── RESULTS ── */
.results{animation:fu .8s ease both}
.res-hero{text-align:center;padding:32px 0 28px;margin-bottom:24px;border-bottom:2px dashed var(--bd)}
.res-hero h2{
  font-size:clamp(20px,4vw,30px);font-weight:800;margin-bottom:8px;
  background:linear-gradient(135deg,var(--g),#f5a623,var(--b));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.res-hero p{color:var(--mu);font-size:14px;line-height:1.8}

.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
@media(max-width:480px){.cmp-grid{grid-template-columns:1fr}}
.cmp-col{border-radius:18px;padding:16px 18px}
.cmp-col.c1{background:var(--gl);border:2px solid rgba(232,98,42,.25)}
.cmp-col.c2{background:var(--bl);border:2px solid rgba(42,158,232,.25)}
.cmp-hd{font-size:11px;font-weight:800;letter-spacing:1px;margin-bottom:8px;text-transform:uppercase}
.c1 .cmp-hd{color:var(--g)}.c2 .cmp-hd{color:var(--b)}
.cmp-tags{display:flex;flex-wrap:wrap;gap:6px}
.ctag{font-size:12px;padding:4px 11px;border-radius:100px;font-weight:700;background:var(--sf);border:2px solid}
.ct1{border-color:rgba(232,98,42,.4);color:var(--g)}
.ct2{border-color:rgba(42,158,232,.4);color:var(--b)}

.diff-box{
  background:var(--sf);border:2px solid var(--bd);border-radius:20px;
  padding:16px 18px;margin-bottom:20px;display:grid;grid-template-columns:1fr auto 1fr;gap:10px;
  box-shadow:0 2px 12px rgba(0,0,0,.05);
}
.diff-col{display:flex;flex-direction:column;gap:6px}
.dlbl{font-size:10px;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.dl-up{color:var(--g)}.dl-dn{color:var(--dn)}.dl-sm{color:var(--b)}
.dtag{font-size:12px;padding:4px 11px;border-radius:100px;font-weight:700;display:inline-block;margin-bottom:3px}
.dt-up{background:var(--gl);color:var(--g)}
.dt-dn{background:var(--dl);color:var(--dn)}
.dt-sm{background:var(--bl);color:var(--b)}
.diff-sep{width:2px;background:var(--bd);align-self:stretch;border-radius:2px}
.dnone{font-size:12px;color:var(--mu)}

.id-box{
  background:linear-gradient(135deg,#fff9f0,#f0f7ff);
  border:2px solid var(--bd);border-radius:22px;
  padding:24px 28px;margin-bottom:32px;text-align:center;
  box-shadow:0 4px 20px rgba(0,0,0,.06);
  position:relative;overflow:hidden;
}
.id-box::before{
  content:'✨';position:absolute;top:12px;right:16px;font-size:22px;opacity:.4;
}
.id-lbl{font-size:11px;font-weight:800;letter-spacing:2px;color:var(--g);margin-bottom:10px;text-transform:uppercase}
.id-box p{font-size:15px;line-height:1.9;font-weight:700}

.r-sec{margin-bottom:40px}
.r-sec-title{
  font-size:12px;font-weight:800;letter-spacing:1px;color:var(--b);
  text-transform:uppercase;margin-bottom:16px;padding-bottom:12px;
  border-bottom:3px dashed var(--bd);display:flex;align-items:center;gap:8px;
}
.rsn{
  width:26px;height:26px;border-radius:10px;
  background:linear-gradient(135deg,var(--b),#6ec6f5);
  color:#fff;font-size:11px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* value cards */
.vtabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.vtab{
  padding:7px 16px;border-radius:100px;border:2px solid var(--bd);
  font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;
  background:var(--sf);color:var(--mu);
  font-family:'M PLUS Rounded 1c',sans-serif;
}
.vtab:hover{transform:translateY(-1px)}
.vtab.at1.ac{background:var(--gl);border-color:rgba(232,98,42,.4);color:var(--g);box-shadow:var(--sh)}
.vtab.at2.ac{background:var(--bl);border-color:rgba(42,158,232,.4);color:var(--b);box-shadow:var(--sh2)}
.vtab.atb.ac{background:linear-gradient(135deg,var(--gl),var(--bl));border-color:var(--bd);color:var(--tx)}

.vc{
  background:var(--sf);border:2px solid var(--bd);border-radius:22px;
  padding:22px 26px;margin-bottom:12px;
  box-shadow:0 3px 16px rgba(0,0,0,.06);
  transition:transform .2s;
}
.vc:hover{transform:translateY(-2px)}
.vct{display:flex;align-items:flex-start;gap:13px;margin-bottom:14px}
.vrk{
  width:36px;height:36px;border-radius:12px;font-size:16px;font-weight:800;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.vr1{background:var(--gl);color:var(--g)}
.vr2{background:var(--bl);color:var(--b)}
.vrb{background:linear-gradient(135deg,var(--gl),var(--bl));color:var(--tx)}
.vnm{font-size:17px;font-weight:800;margin-bottom:2px}
.ven{font-size:11px;color:var(--mu);letter-spacing:1px;font-family:'DM Mono',monospace}

/* BAR with percentage */
.vbar-row{margin-left:auto;display:flex;align-items:center;gap:7px;flex-shrink:0}
.vbar-pct{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;width:34px;text-align:right;flex-shrink:0}
.vpct1{color:var(--g)}.vpct2{color:var(--b)}
.vbar-w{width:72px}
.vbar-bg{height:8px;background:var(--bd);border-radius:8px;overflow:hidden}
.vbar-f{height:100%;border-radius:8px;transition:width 1.2s cubic-bezier(.4,0,.2,1) .4s}
.vf1{background:linear-gradient(90deg,var(--g),#f5a623)}
.vf2{background:linear-gradient(90deg,var(--b),#6ec6f5)}

/* both-view bar */
.both-bars{margin-left:auto;display:flex;flex-direction:column;gap:5px;flex-shrink:0;width:140px}
.both-bar-row{display:flex;align-items:center;gap:5px}
.bbl{font-size:10px;font-weight:800;width:28px;flex-shrink:0}
.bbl1{color:var(--g)}.bbl2{color:var(--b)}
.bbar-bg{flex:1;height:6px;background:var(--bd);border-radius:6px;overflow:hidden}
.bbar-f{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.4,0,.2,1) .4s}
.bbf1{background:linear-gradient(90deg,var(--g),#f5a623)}
.bbf2{background:linear-gradient(90deg,var(--b),#6ec6f5)}
.bpct{font-family:'DM Mono',monospace;font-size:10px;width:26px;text-align:right;flex-shrink:0;font-weight:700}
.bpct1{color:var(--g)}.bpct2{color:var(--b)}

.vco{font-size:13px;color:var(--g);font-weight:700;margin-bottom:10px;font-style:italic}
.vwh{font-size:14px;color:var(--mu);line-height:1.85;margin-bottom:12px}
.vdet{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:480px){.vdet{grid-template-columns:1fr}}
.dblk{background:var(--s2);border-radius:12px;padding:11px 13px}
.dblk-l{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--b);margin-bottom:5px;text-transform:uppercase}
.dblk p{font-size:13px;color:var(--mu);line-height:1.65}

/* career/axis/tension/bs */
.cb{
  background:var(--sf);border:2px solid var(--bd);border-radius:20px;
  padding:20px 24px;margin-bottom:12px;
  box-shadow:0 2px 10px rgba(0,0,0,.05);
}
.cb h3{font-size:15px;font-weight:800;margin-bottom:3px}
.cb-s{font-size:11px;color:var(--mu);margin-bottom:10px;letter-spacing:.5px;font-weight:700}
.cb p{font-size:14px;color:var(--mu);line-height:1.85;margin-bottom:8px}
.cb p:last-of-type{margin-bottom:0}
.fl{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.ft{font-size:12px;padding:5px 11px;border-radius:100px;font-weight:700;border:2px solid}
.ftg{border-color:rgba(232,98,42,.35);color:var(--g);background:var(--gl)}
.ftb{border-color:rgba(232,98,42,.2);color:var(--dn);background:var(--dl)}

.axc{
  background:var(--sf);border:2px solid var(--bd);
  border-left:5px solid var(--g);border-radius:20px;
  padding:20px 24px;margin-bottom:12px;
}
.axc h3{font-size:14px;font-weight:800;margin-bottom:8px}
.axq{
  font-size:14px;font-style:italic;color:var(--g);font-weight:800;
  padding:11px 15px;background:var(--gl);border-radius:12px;margin:10px 0;line-height:1.6;
}
.axc p{font-size:13px;color:var(--mu);line-height:1.85}

.tc{border:2px solid rgba(232,98,42,.25);background:#fff7f4;border-radius:20px;padding:20px 24px;margin-bottom:12px}
.tlbl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--g);margin-bottom:10px;text-transform:uppercase}
.tc h3{font-size:14px;font-weight:800;margin-bottom:8px}
.tc p{font-size:13px;color:var(--mu);line-height:1.85;margin-bottom:7px}
.tr{background:#fff;border:2px solid var(--bd);border-radius:12px;padding:12px 15px;margin-top:10px}
.trl{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--g);margin-bottom:5px;text-transform:uppercase}
.tr p{font-size:13px;color:var(--mu);line-height:1.75;margin-bottom:0}

.bsc{border:2px solid rgba(155,89,182,.2);background:var(--pl);border-radius:20px;padding:20px 24px;margin-bottom:12px}
.bsl{font-size:10px;font-weight:800;letter-spacing:2px;color:var(--p);margin-bottom:10px;text-transform:uppercase}
.bsc h3{font-size:14px;font-weight:800;margin-bottom:8px}
.bsc p{font-size:13px;color:var(--mu);line-height:1.85;margin-bottom:7px}

.wn{
  background:var(--yl);border:2px solid rgba(245,200,66,.5);border-radius:16px;
  padding:14px 18px;margin-top:28px;font-size:13px;color:var(--wn);
  line-height:1.8;font-weight:700;
}

/* CHAT */
.chat-w{
  margin-top:32px;border:2px solid var(--bd);border-radius:24px;
  overflow:hidden;background:var(--sf);
  box-shadow:0 4px 20px rgba(0,0,0,.07);
}
.chat-hd{
  padding:14px 18px;border-bottom:2px solid var(--bd);
  background:linear-gradient(135deg,#fff9f0,#f0f7ff);
  display:flex;align-items:center;gap:10px;
}

const VD={
  自律:{en:"Autonomy",core:"自分の判断と速度で動けることを最重視する",what:"「自由」とは好き勝手することではなく、自分の判断に責任を持って行動できる状態のこと。指示待ちや承認フロー、理由のわからないルールに強いフラストレーションを感じる。自分でゴールを決め、プロセスを設計し、成果に責任を持てる環境では驚くほど高いパフォーマンスを発揮する。",str:"自己完結型の意思決定が速い。管理がなくても動ける。",shd:"チームワークや制約が多い環境で消耗しやすい。孤立しがちになることがある。",fits:["フリーランス","個人事業主","スタートアップ（初期）","クリエイター"],avds:["大企業の中間管理職","承認フローの多い組織"],adv:"「ゴールだけ渡されて、やり方は任せる」という環境で最も力を発揮します。自律の確保を交渉の優先順位1位に置くことを意識してください。"},
  創造:{en:"Creativity",core:"無から有を生む行為そのものが報酬になる",what:"創造はエネルギーの源泉そのもの。既存のものを改善・管理するより、ゼロから設計したり独自の表現を生み出したりすることに本質的な喜びを感じる。「これは自分にしか作れない」という感覚が最大の動機になる。",str:"独自の視点と表現力。問題を新しい角度から見る能力。",shd:"既存フローの維持・繰り返し作業に強い閉塞感を覚える。完成より探索を好みすぎるとアウトプットが出にくくなる。",fits:["クリエイター","イラストレーター","Live2Dデザイナー","コンテンツクリエイター"],avds:["オペレーション・管理業務中心","同じ作業の繰り返し"],adv:"「創造できるか」を仕事選びの一次フィルタにしてよいです。ただし創造と収益の接点を意識的に設計しないと趣味で終わるリスクがあります。"},
  誠実:{en:"Integrity",core:"自分の信念と行動の一致を最重要視する",what:"最も耐えられないのは「本当はそう思っていないのに、そう言わざるを得ない」という状況。自分が正しいと思うことを言える場所では驚くほど粘り強くなる。逆に信念に反することを求められると、条件が良くても消耗する。",str:"ブレない姿勢への信頼感。長期的な一貫性。",shd:"「建前」や「空気を読む」場面で強いストレスを感じる。完璧主義的になりすぎると他者との摩擦が増える。",fits:["専門職（独立系）","クリエイター","コンサルタント"],avds:["政治的な社内調整が多い役職","建前が多い組織"],adv:"「本音で話せるか」「自分の信念と合致するか」を条件より先に判断基準にしてください。環境選びで7割が決まります。"},
  成長:{en:"Growth",core:"昨日より今日の自分が上手くなっていることが生きる実感になる",what:"停滞が最も苦しい状態。スキルが磨かれる、視野が広がる、できなかったことができるようになる——そのプロセスそのものに強い充実感を感じる。同じことの繰り返しや学びのない仕事は急速にモチベーションを失わせる。",str:"自主的に学ぶ。困難を成長機会として捉えられる。",shd:"プラトー期（成長が見えにくい時期）で自己評価が急落しやすい。",fits:["専門職","クリエイター（技術的深化が見える分野）","スタートアップ"],avds:["完全にルーティン化した業務","変化のない組織"],adv:"「3ヶ月後に何が上手くなっているか」を仕事選びの基準にする習慣をつけると判断が速くなります。"},
  つながり:{en:"Connection",core:"深く共鳴できる人間関係の中にいることで本来の力が出る",what:"最もエネルギーが出るのは「この人のために」という具体的な誰かを思い浮かべられるとき。顔が見える誰かへの貢献の方が抽象的な「社会のため」より強い動機になる。誰かと共有しながら進む感覚が仕事の質と量を引き上げる。",str:"共感力が高い。信頼関係の構築が速い。",shd:"人間関係の問題がパフォーマンスに直結しやすい。",fits:["チームベースのクリエイティブ職","コーチ","コラボレーション系"],avds:["完全に一人で完結する作業が続く環境"],adv:"「誰のために作るか」「誰と一緒にやるか」が仕事の内容より先に来ることを認識してよいです。"},
  貢献:{en:"Contribution",core:"自分の行動が誰かの役に立っていることが行動の燃料になる",what:"「これが役に立った」という実感が一番の報酬。誰かの問題を解決する、誰かが前に進む助けになる——その瞬間に強い充足感を感じる。他者への影響が明確な目標の方がずっと長く走れる。",str:"サービス精神が高い。動機が持続しやすい。",shd:"相手の反応が得られないと急速にやる気を失う。貢献が搾取に変わっても気づきにくい。",fits:["教育・コーチング","クリエイター（ファンへの貢献意識）","コンサルタント"],avds:["感謝が見えない環境","成果が数字にしか見えない仕事"],adv:"「誰の、どんな問題を解決するか」を事業のスタートに置くと強くなります。貢献の範囲と対価を明確に設定する習慣が必要です。"},
  承認:{en:"Recognition",core:"努力や成果が正しく見られ、評価されることを重視する",what:"「自分の努力が正しく意味づけられたい」という誠実な欲求。見えない場所での頑張りには強い虚しさを感じ、「あなたの仕事は価値があった」と言われると驚くほどの力が湧く。評価されることで「方向性は正しい」という確認が得られることが重要。",str:"フィードバックへの感度が高い。評価される仕事を自然に意識する。",shd:"評価されない期間に自己否定に陥りやすい。他者の評価に依存しすぎると軸がブレる。",fits:["評価指標が明確な職種","発信・表現系（反応が見える）"],avds:["成果が長期間見えない仕事","評価基準が不透明な組織"],adv:"SNSのエンゲージメントやポートフォリオの反応など、フィードバックが見える環境を自分で設計することが安定につながります。"},
  安定:{en:"Stability",core:"足元が安定しているからこそ本当の挑戦ができる",what:"安定志向は臆病さではなく合理性。リスクを管理しながら着実に進むことが長期的に最も大きな成果を生むという感覚を持っている。不確実性が高すぎる状況ではパフォーマンスが落ちるが、一定の基盤が確保された中では大胆に動ける。",str:"リスク管理が自然にできる。継続力が高い。",shd:"安定の確保が目的化すると変化への一歩が踏み出せなくなる。「準備ができてから」が永遠に来ない罠に入りやすい。",fits:["実力が蓄積される専門職","副業から徐々に移行するキャリア"],avds:["一発勝負型のビジネス","収入が不安定なフェーズでの大きなコミット"],adv:"「どのくらいの安定があれば動けるか」を具体的な数字で定義すること。条件が揃ったら迷わず動く、という自分との約束が重要です。"},
  調和:{en:"Harmony",core:"摩擦より対話を選び、バランスを保つことに価値を置く",what:"対立そのものに強いコストを感じる。「この関係が壊れないか」を先に計算してしまう。これは優柔不断ではなく、関係の長期的な価値を重視する感覚。一方で本当に大切なことを言えない状況が続くと静かに消耗する。",str:"摩擦を最小化する対話ができる。多様な立場と共存できる。",shd:"重要な局面で自分の意見を押し込めやすい。調和を保つコストを自分が全て引き受ける傾向がある。",fits:["ファシリテーター","チームの橋渡し役","クライアントワーク"],avds:["強いリーダーシップと対立を要する役職"],adv:"「調和を大切にする」ことと「自分を消す」ことは別です。「ここは折れない」という核を先に決めておくことが持続可能な調和につながります。"},
};

const VE={
  自律:"「自分のペースと判断で動きたい」という欲求。管理や指示より自分で決めて動ける状況が心地よい状態。",
  創造:"「何かを自分の手で作り出したい」という欲求。ゼロから作るときにエネルギーが湧く状態。",
  誠実:"「自分の本音・信念に従って行動したい」という欲求。建前や妥協が最もストレスになる状態。",
  成長:"「昨日より今日の自分が上手くなっていたい」という欲求。停滞や繰り返しがつらい状態。",
  つながり:"「大切な誰かと深くつながっていたい」という欲求。顔が見える相手のために動くとき最も力が出る状態。",
  貢献:"「自分の行動が誰かの役に立っていることを感じたい」という欲求。感謝や反応が見えるとエネルギーが湧く状態。",
  承認:"「努力や成果をちゃんと見てほしい・評価されたい」という欲求。見えない場所での頑張りに虚しさを感じやすい状態。",
  安定:"「足元を固めた上で動きたい」という欲求。見通しが立つと安心して大きく動ける状態。",
  調和:"「摩擦を避けて、関係をバランスよく保ちたい」という欲求。対立より対話を選ぶ状態。",
};

const CTX={work:"💼 仕事・キャリア",creative:"🎨 創作・副業",private:"🏠 プライベート",mixed:"🔄 総合"};

// STATE
let c1=null,c2=null,cur=0;
let a1=[],a2=[],sk=new Set();
let s1={},s2={};
Object.keys(VD).forEach(k=>{s1[k]=0;s2[k]=0;});

function sc(n,v){
  if(n===1){
    c1=v;
    document.querySelectorAll('#co1 .ctx-btn').forEach(b=>b.classList.remove('sl'));
    document.querySelector(`#co1 [data-v="${v}"]`).classList.add('sl');
  } else {
    c2=v;
    document.querySelectorAll('#co2 .ctx-btn').forEach(b=>b.classList.remove('sl'));
    document.querySelector(`#co2 [data-v="${v}"]`).classList.add('sl');
  }
  const btn=document.getElementById('startBtn');
  if(c1&&c2){
    if(c1===c2){btn.disabled=true;btn.textContent='同じ視点は選べません。異なる視点を選んでください';}
    else{btn.disabled=false;btn.textContent=`「${CTX[c1]}」と「${CTX[c2]}」ではじめる →`;}
  } else {btn.disabled=true;btn.textContent='2つの視点を選んではじめる';}
}

function startQ(){
  if(!c1||!c2||c1===c2)return;
  document.getElementById('topSec').classList.add('hidden');
  document.getElementById('qSec').classList.remove('hidden');
  renderQ();
}

function renderQ(){
  const q=QS[cur];
  document.getElementById('qCat').textContent=q.cat;
  document.getElementById('qTxt').textContent=q.txt;
  document.getElementById('pL').textContent=`Q ${cur+1} / ${QS.length}`;
  document.getElementById('qCtr').textContent=`${cur+1} / ${QS.length}`;
  const pct=Math.round((cur/QS.length)*100);
  document.getElementById('pF').style.width=pct+'%';
  document.getElementById('pP').textContent=pct+'%';
  const nd=document.getElementById('qNote');
  if(q.note){nd.textContent='💡 '+q.note;nd.classList.remove('hidden');}
  else nd.classList.add('hidden');
  const dw=document.getElementById('dualWrap');
  dw.innerHTML=`
    <div class="ab ab1">
      <div class="ab-hd"><div class="dot d1"></div>${CTX[c1]}</div>
      ${q.opts.map((o,i)=>`<button class="ao${a1[cur]===i?' sl':''}" onclick="sa(1,${i})"><span class="aok">${'ABC'[i]}</span><span>${o.t}</span></button>`).join('')}
    </div>
    <div class="ab ab2">
      <div class="ab-hd"><div class="dot d2"></div>${CTX[c2]}</div>
      ${q.opts.map((o,i)=>`<button class="ao${a2[cur]===i?' sl':''}" onclick="sa(2,${i})"><span class="aok">${'ABC'[i]}</span><span>${o.t}</span></button>`).join('')}
    </div>`;
  updSt();
  document.getElementById('backBtn').style.display=cur===0?'none':'inline-flex';
  const card=document.getElementById('qCard');
  card.style.animation='none';card.offsetHeight;card.style.animation='fu .4s ease both';
}

function sa(n,i){
  if(n===1){a1[cur]=i;document.querySelectorAll('#dualWrap .ab1 .ao').forEach((e,x)=>e.classList.toggle('sl',x===i));}
  else{a2[cur]=i;document.querySelectorAll('#dualWrap .ab2 .ao').forEach((e,x)=>e.classList.toggle('sl',x===i));}
  updSt();
}

function updSt(){
  const ok1=a1[cur]!==undefined||sk.has(cur);
  const ok2=a2[cur]!==undefined||sk.has(cur);
  const d1=document.getElementById('sd1'),d2=document.getElementById('sd2');
  d1.className='qsd'+(ok1?' d1ok':'');
  d2.className='qsd'+(ok2?' d2ok':'');
  document.getElementById('sl1').textContent=ok1?`${CTX[c1]} ✓`:`${CTX[c1]} 未選択`;
  document.getElementById('sl2').textContent=ok2?`${CTX[c2]} ✓`:`${CTX[c2]} 未選択`;
  document.getElementById('nextBtn').disabled=!(ok1&&ok2);
}

function skipQ(){sk.add(cur);updSt();setTimeout(goNext,100);}

function goNext(){
  if(!(a1[cur]!==undefined||sk.has(cur))||!(a2[cur]!==undefined||sk.has(cur)))return;
  if(cur===QS.length-1){calc();return;}
  cur++;renderQ();
}

function goBack(){if(cur===0)return;cur--;renderQ();}

function calc(){
  document.getElementById('qSec').classList.add('hidden');
  document.getElementById('loadSec').classList.remove('hidden');
  Object.keys(s1).forEach(k=>{s1[k]=0;s2[k]=0;});
  QS.forEach((q,qi)=>{
    if(sk.has(qi))return;
    if(a1[qi]!==undefined)Object.entries(q.opts[a1[qi]].s).forEach(([k,v])=>{s1[k]=(s1[k]||0)+v;});
    if(a2[qi]!==undefined)Object.entries(q.opts[a2[qi]].s).forEach(([k,v])=>{s2[k]=(s2[k]||0)+v;});
  });
  setTimeout(()=>{document.getElementById('loadSec').classList.add('hidden');renderResults();},1800);
}

function renderResults(){
  const sorted1=Object.entries(s1).sort((a,b)=>b[1]-a[1]);
  const sorted2=Object.entries(s2).sort((a,b)=>b[1]-a[1]);
  const top1=sorted1.slice(0,3).map(t=>t[0]);
  const top2=sorted2.slice(0,3).map(t=>t[0]);
  const set1=new Set(top1),set2=new Set(top2);
  const appeared=top2.filter(v=>!set1.has(v));
  const disappeared=top1.filter(v=>!set2.has(v));
  const stayed=top2.filter(v=>set1.has(v));
  const mx1=sorted1[0][1]||1, mx2=sorted2[0][1]||1;

  const html=`
    <div class="res-hero">
      <div class="badge">診断完了</div>
      <h2>2つの自分の価値観マップ</h2>
      <p>${CTX[c1]}と${CTX[c2]}の差分から、あなたの本音が見えてきました。</p>
    </div>

    <div class="cmp-grid">
      <div class="cmp-col c1">
        <div class="cmp-hd">${CTX[c1]}</div>
        <div class="cmp-tags">${top1.map((v,i)=>`<span class="ctag ct1">${i+1}. ${v}</span>`).join('')}</div>
      </div>
      <div class="cmp-col c2">
        <div class="cmp-hd">${CTX[c2]}</div>
        <div class="cmp-tags">${top2.map((v,i)=>`<span class="ctag ct2">${i+1}. ${v}</span>`).join('')}</div>
      </div>
    </div>

    <div class="diff-box">
      <div class="diff-col">
        <div class="dlbl dl-up">新登場</div>
        ${appeared.length?appeared.map(v=>`<span class="dtag dt-up">↑ ${v}</span>`).join(''):'<span class="dnone">なし</span>'}
        ${disappeared.length?`<div class="dlbl dl-dn" style="margin-top:10px">消えた</div>${disappeared.map(v=>`<span class="dtag dt-dn">↓ ${v}</span>`).join('')}`:''}
      </div>
      <div class="diff-sep"></div>
      <div class="diff-col">
        <div class="dlbl dl-sm">両方に共通</div>
        ${stayed.length?stayed.map(v=>`<span class="dtag dt-sm">= ${v}</span>`).join(''):'<span class="dnone">なし</span>'}
      </div>
    </div>

    ${buildId(top1,top2,appeared,disappeared,stayed)}

    <div class="r-sec">
      <div class="r-sec-title"><div class="rsn">01</div>価値観ランキング — 詳細解説</div>
      <div class="vtabs">
        <button class="vtab at1 ac" id="tb1" onclick="swTab('1')">${CTX[c1]}</button>
        <button class="vtab at2" id="tb2" onclick="swTab('2')">${CTX[c2]}</button>
        <button class="vtab atb" id="tbb" onclick="swTab('b')">両方比較</button>
      </div>
      <div id="vc1">${sorted1.slice(0,5).map(([k,v],i)=>buildVC(k,v,mx1,i,'1')).join('')}</div>
      <div id="vc2" class="hidden">${sorted2.slice(0,5).map(([k,v],i)=>buildVC(k,v,mx2,i,'2')).join('')}</div>
      <div id="vcb" class="hidden">${buildBoth(sorted1,sorted2,mx1,mx2)}</div>
    </div>

    <div class="r-sec">
      <div class="r-sec-title"><div class="rsn">02</div>差分から読み解くキャリアの方向性</div>
      ${buildCareer(top1,top2,appeared,disappeared,stayed)}
    </div>

    <div class="r-sec">
      <div class="r-sec-title"><div class="rsn">03</div>意思決定の軸</div>
      ${buildAxes(stayed.length?stayed:top2)}
    </div>

    <div class="r-sec">
      <div class="r-sec-title"><div class="rsn">04</div>内なる葛藤と対処法</div>
      ${buildTens([...new Set([...top1,...top2])])}
      ${buildBS(sorted1,sorted2)}
    </div>

    <div class="wn">📌 この結果は「現在の自分」のスナップショットです。6ヶ月後に再度やってみることで、価値観のシフトを確認できます。</div>

    <div class="chat-w" id="chatW">
      <div class="chat-hd"><div class="chat-hd-i">🔍</div><div><div class="chat-hd-t">差分 深掘りチャット</div><div class="chat-hd-s">2つの結果の差分から本音を掘り下げる</div></div></div>
      <div class="chat-msgs" id="chatM"></div>
      <div class="chips-r" id="chipsR"></div>
      <div class="chat-inp">
        <textarea id="chatI" placeholder="思ったことを自由に書いてください..." rows="1" onkeydown="ck(event)" oninput="car(this)"></textarea>
        <button class="csend" id="csnd" onclick="csd()">↑</button>
      </div>
    </div>

    <div class="rbtns"><button class="rbtn rbs" onclick="restart()">最初からやり直す</button></div>
    ${buildShareBox(top1,top2,appeared,stayed)}
  `;

  const sec=document.getElementById('resSec');
  sec.innerHTML=html;sec.classList.remove('hidden');
  setTimeout(()=>{document.querySelectorAll('.vbar-f,.bbar-f').forEach(el=>{el.style.width=el.dataset.pct+'%';});},400);
  initChat({c1,c2,top1,top2,appeared,disappeared,stayed});
}

function swTab(t){
  ['1','2','b'].forEach(x=>{
    document.getElementById('tb'+x)?.classList.remove('ac');
    document.getElementById('vc'+x)?.classList.add('hidden');
  });
  document.getElementById('tb'+t).classList.add('ac');
  document.getElementById('vc'+t).classList.remove('hidden');
  setTimeout(()=>{document.querySelectorAll('.vbar-f,.bbar-f').forEach(el=>{el.style.width=el.dataset.pct+'%';});},100);
}

function buildVC(key,val,mx,rank,side){
  const d=VD[key];if(!d)return'';
  const pct=Math.round((val/mx)*100);
  const rk=side==='1'?'vr1':'vr2';
  const fc=side==='1'?'vf1':'vf2';
  const pc=side==='1'?'vpct1':'vpct2';
  return `<div class="vc fi">
    <div class="vct">
      <div class="vrk ${rk}">${rank+1}</div>
      <div><div class="vnm">${key} <span class="ven">${d.en}</span></div></div>
      <div class="vbar-row">
        <span class="vbar-pct ${pc}">${pct}%</span>
        <div class="vbar-w"><div class="vbar-bg"><div class="vbar-f ${fc}" style="width:0%" data-pct="${pct}"></div></div></div>
      </div>
    </div>
    <div class="vco">「${d.core}」</div>
    <p class="vwh">${d.what}</p>
    <div class="vdet">
      <div class="dblk"><div class="dblk-l">強み</div><p>${d.str}</p></div>
      <div class="dblk"><div class="dblk-l">影の側面</div><p>${d.shd}</p></div>
    </div>
  </div>`;
}

function buildBoth(s1arr,s2arr,mx1,mx2){
  const keys=[...new Set([...s1arr.slice(0,5).map(t=>t[0]),...s2arr.slice(0,5).map(t=>t[0])])];
  return keys.map(key=>{
    const d=VD[key];if(!d)return'';
    const v1=s1[key]||0,v2=s2[key]||0;
    const p1=Math.round((v1/mx1)*100),p2=Math.round((v2/mx2)*100);
    return `<div class="vc fi">
      <div class="vct">
        <div class="vrk vrb">↔</div>
        <div><div class="vnm">${key} <span class="ven">${d.en}</span></div></div>
        <div class="both-bars">
          <div class="both-bar-row">
            <span class="bbl bbl1">${CTX[c1].slice(0,2)}</span>
            <div class="bbar-bg"><div class="bbar-f bbf1" style="width:0%" data-pct="${p1}"></div></div>
            <span class="bpct bpct1">${p1}%</span>
          </div>
          <div class="both-bar-row">
            <span class="bbl bbl2">${CTX[c2].slice(0,2)}</span>
            <div class="bbar-bg"><div class="bbar-f bbf2" style="width:0%" data-pct="${p2}"></div></div>
            <span class="bpct bpct2">${p2}%</span>
          </div>
        </div>
      </div>
      <p class="vwh">${d.what}</p>

  }).join('');
}

function buildId(t1,t2,ap,dis,st){
  let stmt='';
  if(st.length>=2)stmt=`どちらの視点でも「${st[0]}」と「${st[1]}」が共通しています。これはあなたにとって文脈に関係なく一貫して大切なもの——迷ったときの判断基準の核にしてください。`;
  else if(ap.includes('貢献')||ap.includes('つながり'))stmt=`${CTX[c2]}のモードになると「${ap[0]}」が前に出てくる。つまりあなたの創作・活動のエンジンは「誰かのために」という具体的な動機です。`;
  else if(dis.length&&ap.length)stmt=`${CTX[c1]}では「${dis[0]}」が大事なのに、${CTX[c2]}では「${ap[0]}」に変わる——この差分が、あなたの中のモードの切り替えを示しています。`;
  else stmt=`2つの視点で「${[...new Set([...t1,...t2])].slice(0,3).join('・')}」が重要な価値観として浮かび上がりました。これがあなたの行動の核です。`;
  return `<div class="id-box"><div class="id-lbl">差分から見えた本音</div><p>${stmt}</p></div>`;
}

function buildCareer(t1,t2,ap,dis,st){
  const core=st.length?st:t2;
  let synth='';
  if(core.includes('自律')&&core.includes('創造'))synth='「自分の裁量で、自分の手で作る」がコアです。フリーランス・個人事業・クリエイターという独立系のキャリアで最も力を発揮します。';
  else if(core.includes('貢献')&&core.includes('つながり'))synth='顔が見える誰かのために動ける仕事で最もパフォーマンスを出します。規模より深さ——少数の人に深く関わるキャリアが長続きします。';
  else if(core.includes('誠実')&&core.includes('自律'))synth='最も消耗するのは「信じていないことを言わなければならない状況」。専門性を背景に自分の言葉で価値を提供できる独立系の仕事が最も適しています。';
  else synth=`「${core.join('・')}」が満たされる環境を探すことが最重要です。給与・肩書きより、この条件の充足率で仕事を評価してください。`;
  const fits=[...new Set(core.flatMap(k=>(VD[k]||{}).fits||[]))].slice(0,5);
  const avds=[...new Set(core.flatMap(k=>(VD[k]||{}).avds||[]))].slice(0,3);
  let blocks=`<div class="cb"><h3>総合的な方向性</h3><div class="cb-s">2視点の共通点から導いた方向性</div><p>${synth}</p>
    <div class="fl">${fits.map(f=>`<span class="ft ftg">✓ ${f}</span>`).join('')}</div>
    ${avds.length?`<div class="fl" style="margin-top:4px">${avds.map(f=>`<span class="ft ftb">✗ ${f}</span>`).join('')}</div>`:''}
  </div>`;
  if(ap.length&&dis.length){
    blocks+=`<div class="cb"><h3>差分が示すこと</h3><div class="cb-s">2つの視点で変わった価値観の意味</div>
    <p>「${dis[0]}」は${CTX[c1]}では大事なのに、${CTX[c2]}では後ろに下がる。一方「${ap[0]}」が${CTX[c2]}で前に出てくる。${VE[ap[0]]||''}</p>
    <p>${CTX[c2]}の活動をするときは「${ap[0]}」を意識的に動機の中心に置くと、エネルギーが安定しやすくなります。</p>
    </div>`;
  }
  core.forEach(k=>{
    const d=VD[k];if(!d)return;
    blocks+=`<div class="cb"><h3>${k}（${d.en}）の観点から</h3><div class="cb-s">この価値観が高い人へのアドバイス</div><p>${d.adv}</p></div>`;
  });
  return blocks;
}

function buildAxes(keys){
  const AD={
    自律:{t:"「これは自分の判断で動けるか？」",b:"YESなら前進。NOなら、その制約が一時的か恒久的かを確認する。"},
    創造:{t:"「これには自分にしか作れないものがあるか？」",b:"単なる作業と、自分の創造性が入り込める仕事を区別する問い。後者を選び続けることが長期的な差別化につながります。"},
    誠実:{t:"「これをやることは自分に正直か？」",b:"条件がよくてもNOなら長続きしません。"},
    成長:{t:"「3ヶ月後、自分は何が上手くなっているか？」",b:"成長の絵が描けるかを確認する。描けないなら維持コストだけで成長がない可能性が高いです。"},
    つながり:{t:"「誰のために、誰と一緒にやるか？」",b:"仕事の内容より先にこの二つを決めると判断が速くなります。"},
    貢献:{t:"「これは誰の役に立っているか、見えるか？」",b:"貢献の実感が見えないと消耗します。フィードバックが見える仕組みがあるかを確認してください。"},
    承認:{t:"「評価の基準が明確で、フィードバックが得られるか？」",b:"フィードバックが見える環境を自分で設計してください。"},
    安定:{t:"「この選択で、足元は保たれるか？」",b:"リスクを取る前に地に足をつける問い。条件を明確に設定しないと準備が永遠に終わりません。"},
    調和:{t:"「ここだけは折れない、という核はどこか？」",b:"核を一つ決めてから柔軟に動くことが持続可能な調和です。"},

}

function buildTens(keys){
  const PS=[
    {c:k=>k.includes('自律')&&k.includes('承認'),t:"自律 vs 承認",b1:"「自分で動きたい」と「ちゃんと評価されたい」が共存しています。",b2:"評価されない期間に揺れる。評価されると「本当にやりたいことか」と迷う。",r:"内部評価（自分の基準）を主軸に置くことで承認がなくても自律を保てます。"},
    {c:k=>k.includes('誠実')&&k.includes('調和'),t:"誠実 vs 調和",b1:"「正直に言いたい」と「関係を傷つけたくない」が衝突します。",b2:"沈黙すると誠実さが傷つく。正直に言うと関係に亀裂が入るかもしれない。",r:"「内容は譲らない、伝え方は工夫する」という分離思考が鍵です。"},
    {c:k=>k.includes('安定')&&k.includes('創造'),t:"安定 vs 創造",b1:"安定を求める自分と、新しいものを生み出したい自分が綱引きをしています。",b2:"「準備ができてから」という思考が創造の機会を先送りにし続けるリスクがあります。",r:"「安定レベル」を数値で定義し、達成したら自動的に次へ移るという約束が有効です。"},
    {c:k=>k.includes('自律')&&k.includes('つながり'),t:"自律 vs つながり",b1:"「一人でいたい」と「つながっていたい」が矛盾します。",b2:"一人の時間は充実するのに孤独感を感じる。誰かといると安心するのに関わりすぎると消耗する。",r:"「一人で作る時間」と「誰かと共有する時間」を意図的に分ける設計が有効です。"},
    {c:k=>k.includes('成長')&&k.includes('安定'),t:"成長 vs 安定",b1:"成長のためには現状を壊す必要があるが、安定を求める自分がブレーキをかけます。",b2:"「今の環境は安全だが成長がない」と感じながら変化に踏み出せない状態が生まれやすいです。",r:"現状維持も一種のリスクです。「このまま続けたら1年後に何を失うか」を問いかけてみてください。"},
  ];
  const found=PS.filter(p=>p.c(keys));
  if(!found.length)return`<div class="tc"><div class="tlbl">TENSION</div><h3>明確な葛藤パターンなし</h3><p>上位の価値観が比較的同方向を向いており、大きな内的衝突は検出されませんでした。</p></div>`;
  return found.map(t=>`<div class="tc"><div class="tlbl">内なる葛藤</div><h3>${t.t}</h3><p>${t.b1}</p><p>${t.b2}</p><div class="tr"><div class="trl">対処法</div><p>${t.r}</p></div></div>`).join('');
}

    承認:"「承認」への意識が低い傾向があります。他者のフィードバックを軽視しすぎると客観的な視点を失うリスクがあります。",
    つながり:"「つながり」への意識が低い傾向があります。重要な人脈形成が遅れるリスクがあります。",
    貢献:"「貢献」への意識が低い傾向があります。「誰かの役に立っているか」という視点が薄れると評価を得にくくなる場合があります。",

    誠実:"「誠実さ」への意識が低い傾向があります。「本当はどう思っているか」を後回しにしすぎると長期的に自己不信につながる場合があります。",

// CHAT
let cCtx={},cHist=[],cDis=false,cState={phase:'opening',cc:0},typEl=null;

function initChat(ctx){
  cCtx=ctx;cHist=[];cState={phase:'opening',cc:0};
  const {c1:cx1,c2:cx2,top1,top2,appeared:ap,disappeared:dis,stayed:st}=ctx;
  let msg=`${CTX[cx1]}と${CTX[cx2]}の結果を比べてみます。\n\n`;
  if(ap.length&&dis.length){
    msg+=`一番目立つ変化は、**「${dis[0]}」が${CTX[cx1]}では上位なのに、${CTX[cx2]}では「${ap[0]}」に変わっている**ことです。\n\n`;
    const pairs={自律_貢献:`${CTX[cx1]}では「自分のペースで動きたい」が強かったのに、${CTX[cx2]}では「誰かの役に立ちたい」が前に出てきています。`,自律_つながり:`${CTX[cx1]}では「自分で動く」が強かったのに、${CTX[cx2]}では「誰かとつながる」が前に出てきています。`,成長_貢献:`${CTX[cx1]}では「自分が上手くなること」が動機だったのに、${CTX[cx2]}では「誰かの役に立つこと」が動機になっています。`,承認_貢献:`「評価されること」より${CTX[cx2]}では「役に立つこと」の方が強くなっています。`};
    msg+=pairs[`${dis[0]}_${ap[0]}`]||`${CTX[cx1]}では「${dis[0]}」が大事だったのに、${CTX[cx2]}では「${ap[0]}」が前に出てきています。`;
  } else if(st.length>=2){
    msg+=`「${st[0]}」と「${st[1]}」が両方の視点で共通しています。これはあなたにとって文脈に関係なく一貫して大切なものです。`;
  } else {
    msg+=`2つの視点で結果に差がありました。`;
  }
  msg+=`\n\nこの変化に**心当たりはありますか？**`;
  setTimeout(()=>{addBub('ai',msg);setChips(['心当たりがあります','あまりピンとこない','違う気がします']);},500);
}

function cany(t,ws){return ws.some(w=>t.includes(w));}
function cint(t){
  if(cany(t,['意味','どういう','わからない','理解','教えて','?','？']))return'clarify';
  if(cany(t,['ある','あります','そう','はい','確か','心当たり']))return'agree';
  if(cany(t,['ない','わからない','ピンとこない','違う']))return'disagree';
  if(cany(t,['人','誰','推し','ファン','友','家族']))return'person';
  if(cany(t,['楽しい','好き','充実','やりがい','嬉しい']))return'positive';
  return'freetext';
}

function getCRes(input){
  const intent=cint(input);
  const {c1:cx1,c2:cx2,appeared:ap,disappeared:dis,stayed:st,top2}=cCtx;
  const ph=cState.phase;

  if(intent==='clarify'){
    cState.cc++;
    const last=cHist.filter(h=>h.role==='assistant').slice(-1)[0]?.content||'';
    for(const v of Object.keys(VE)){
      if(last.includes(v))return{msg:`「${v}」について説明しますね。\n\n${VE[v]}\n\nこの説明を聞いて、自分に当てはまりますか？`,chips:['当てはまる','少し違う','完全には当てはまらない']};
    }
    return{msg:`どの部分が気になりましたか？もう少し具体的に教えてください。`,chips:['さっきの言葉の意味','提案されたことの意味','全体的によくわからない']};
  }

  if(ph==='opening'){
    cState.phase='explore';
    if(intent==='agree'||intent==='person'||intent==='positive'||intent==='freetext'){
      const v=ap[0]||top2[0];
      return{msg:`そうなんですね。\n\n「${v}」が${CTX[cx2]}のモードのときに前に出てくる——具体的にどんな場面や瞬間にそれを感じますか？`,chips:['特定の人を思い浮かべるとき','作っているとき','誰かに反応をもらったとき','うまく言葉にできない']};
    }
    return{msg:`そうですか。少し角度を変えて聞かせてください。\n\n${CTX[cx2]}のとき、「これをやっていると充実する」と感じる瞬間はありますか？`,chips:['ある','あまりない','考えたことがなかった']};
  }

  if(ph==='explore'){
    cState.phase='motivation';
    if(intent==='person'||cany(input,['推し','ファン','届','喜'])){
      return{msg:`特定の誰かが浮かぶんですね。\n\nその人のことを思いながら何かをしているとき、どんな気持ちになりますか？`,chips:['エネルギーが湧く','責任感を感じる','楽しくなる','安心する']};
    }
    if(cany(input,['作','描','制作','音楽','イラスト'])){
      return{msg:`作っているときに充実感があるんですね。\n\nそのとき、「誰かに届けたい」という気持ちはありますか？それとも作ること自体が目的ですか？`,chips:['誰かに届けたい','作ること自体が目的','両方ある','わからない']};
    }
    return{msg:`なるほど。\n\n${CTX[cx2]}で一番「自分がやっている」と感じる瞬間を一言で表すとしたら？`,chips:['誰かのために動いているとき','何かを作っているとき','成長を感じたとき','認められたとき']};
  }

  if(ph==='motivation'){
    cState.phase=dis.length?'disappeared':'action';
    if(dis.length){
      return{msg:`ありがとうございます。\n\n一方で、${CTX[cx1]}では「${dis[0]}」が上位でした。\n${VE[dis[0]]?`「${dis[0]}」というのは、${VE[dis[0]]}`:''}これは今も大事ですか？`,chips:['今も大事','少し薄れてきた感じがする','状況によって変わる','正直わからない']};
    }
    return buildActRes();
  }

  if(ph==='disappeared'){
    cState.phase='action';
    return buildActRes();
  }

  if(ph==='action'){
    if(cany(input,['意味','どういう','わからない'])){
      return{msg:`どの部分が気になりましたか？`,chips:['提案された行動の意味','価値観の言葉の意味','全体的によくわからない']};
    }
    if(cany(input,['できそう','やって','やる','試'])){
      cState.phase='done';
      return{msg:`いいですね。\n\nその行動、「いつ」やりますか？\n「今日中に」「今週中に」と決めると実行率が上がります。`,chips:['今日やる','今週中に','来週から','まだ決められない']};
    }
    if(cany(input,['難しい','できない','わからない'])){
      return{msg:`難しく感じるんですね。\n\nどの部分がハードルになっていますか？`,chips:['時間がない','スキルがまだない','何から始めるかわからない','自信がない']};
    }
    return{msg:`なるほど。\n\n今話してくれたことと組み合わせると、もう少し具体的になりそうですね。\n「今すぐできる一番小さい一歩」を一つ決めるとしたら？`,chips:['何かを書き出す','誰かに話す','とりあえず一つ作る','まだ決められない']};
  }

  if(ph==='done'){
    return{msg:`よかったです。\n\n今日言語化できたこと自体が、次の判断を少し楽にしてくれます。\nまた迷ったとき、視点を変えて診断してみてください。`,chips:['もう少し話したい','ありがとう']};
  }

  return{msg:`なるほど。\n\nもう少し聞かせてもらえますか？どんな状況のときにそう感じますか？`,chips:['具体的な場面がある','なんとなくそう感じる','うまく言葉にできない']};
}

function buildActRes(){
  const {appeared:ap,stayed:st,top2}=cCtx;
  const core=st.length?st:top2;
  let acts=[];
  if(core.includes('貢献')||core.includes('つながり'))acts=['「誰のために作るか」を一人だけ具体的に決める','その人に届けることを前提に、小さな作品・投稿を一つする'];
  else if(core.includes('創造'))acts=['「自分にしかできないもの」を一つ完成させて公開する','週に最低1回、創造の時間をスケジュールに入れる'];
  else if(core.includes('成長'))acts=['「3ヶ月後に何が上手くなっているか」を一文で書いてみる','今日から始められる練習・学習を一つ決める'];
  else acts=[`「${core[0]}」が満たされる仕事・活動を3つ書き出す`,'その中で今週試せる最小のものを一つ選んで動いてみる'];
  if(st.length)acts.push(`「${st[0]}」は両方の診断で出てきた——迷ったときの判断基準にする`);
  return{msg:`ここまでの話から、次の行動を整理しました。\n\n**次の行動**\n\n・${acts.join('\n・')}\n\nわかりにくい部分があれば「〇〇の意味がわからない」と聞いてください。\nどれか「できそう」と感じるものはありますか？`,chips:[...acts.map((_,i)=>`${i+1}つ目`),'意味がわからない']};
}

function addBub(role,text){
  const c=document.getElementById('chatM');if(!c)return;
  const w=document.createElement('div');
  w.className='bw'+(role==='user'?' u':'')+' fi';
  const av=document.createElement('div');
  av.className='av'+(role==='user'?' u':'');
  av.textContent=role==='user'?'あ':'🔍';
  const b=document.createElement('div');
  b.className='bub '+(role==='user'?'u':'ai');
  b.innerHTML=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
  role==='user'?(w.appendChild(b),w.appendChild(av)):(w.appendChild(av),w.appendChild(b));
  c.appendChild(w);c.scrollTop=c.scrollHeight;
}

function showTyp(){
  const c=document.getElementById('chatM');if(!c)return;
  typEl=document.createElement('div');typEl.className='bw fi';
  typEl.innerHTML='<div class="av">🔍</div><div class="typing"><span></span><span></span><span></span></div>';
  c.appendChild(typEl);c.scrollTop=c.scrollHeight;
}
function hideTyp(){if(typEl){typEl.remove();typEl=null;}}

function setChips(arr){
  const w=document.getElementById('chipsR');if(!w)return;
  w.innerHTML='';
  arr.forEach(t=>{
    const b=document.createElement('button');b.className='chip';b.textContent=t;
    b.onclick=()=>{document.getElementById('chatI').value=t;csd();};
    w.appendChild(b);
  });
}

function csd(){
  const inp=document.getElementById('chatI');
  const txt=inp.value.trim();if(!txt||cDis)return;
  inp.value='';car(inp);
  document.getElementById('chipsR').innerHTML='';
  addBub('user',txt);cHist.push({role:'user',content:txt});
  cDis=true;document.getElementById('csnd').disabled=true;
  showTyp();
  setTimeout(()=>{
    hideTyp();
    const res=getCRes(txt);
    addBub('ai',res.msg);cHist.push({role:'assistant',content:res.msg});
    if(res.chips&&res.chips.length)setChips(res.chips);
    cDis=false;document.getElementById('csnd').disabled=false;
  },700+Math.random()*500);
}

function ck(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();csd();}}
function car(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,96)+'px';}

function buildShareBox(top1,top2,appeared,stayed){
  const core=stayed.length?stayed:top2;
  const tag1=top1.slice(0,3).join(' / ');
  const tag2=top2.slice(0,3).join(' / ');

  // ツイート文を生成
  let comment='';
  if(stayed.length>=2){
    comment=`どの視点でも「${stayed[0]}」「${stayed[1]}」が一貫していました。これが私の行動の核みたいです。`;
  } else if(appeared.length&&appeared[0]==='貢献'){
    comment=`創作モードになると「貢献」が前に出てくることがわかりました。誰かのために作ることが私のエンジンみたいです。`;
  } else if(appeared.length&&appeared[0]==='つながり'){
    comment=`視点を変えると「つながり」が浮かび上がりました。誰かと共鳴することが私の原動力みたいです。`;
  } else if(core.includes('自律')&&core.includes('創造')){
    comment=`「自律」と「創造」が核でした。自分の手で作ることに生きがいを感じるタイプみたいです。`;
  } else {
    comment=`「${core[0]}」が一番大切な価値観だとわかりました。`;
  }

  const tweetText=`【価値観診断やってみた】\n\n📗 ${CTX[c1]}：${tag1}\n📘 ${CTX[c2]}：${tag2}\n\n${comment}\n\nあなたも試してみて👇https://shirokanept.github.io/values-diagnostic/\n`;

  // グローバルに保存
  window._shareText = tweetText;

  return `
    <div class="share-box">
      <div class="share-box-title">🎉 診断結果をシェアしよう</div>
      <div class="share-box-sub">あなたの価値観をXでシェアして、友達にも試してもらいませんか？</div>
      <div class="share-preview">${tweetText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
      <div class="share-btns">
        <button class="share-btn-x" onclick="shareToX()">
          <svg class="x-icon" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.259 5.631 5.905-5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Xにシェアする
        </button>
        <button class="share-btn-copy" id="copyBtn" onclick="copyShareText()">
          📋 テキストをコピー
        </button>
      </div>
    </div>
  `;
}

function shareToX(){
  const text = window._shareText || '価値観診断をやってみました！';
  const url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(text);
  window.open(url, '_blank', 'width=600,height=400');
}

function copyShareText(){
  const text = window._shareText || '';
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById('copyBtn');
    if(btn){
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(()=>{
        btn.textContent = '📋 テキストをコピー';
        btn.classList.remove('copied');
      }, 2500);
    }
  }).catch(()=>{
    // fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    const btn = document.getElementById('copyBtn');
    if(btn){
      btn.textContent = '✅ コピーしました！';
      btn.classList.add('copied');
      setTimeout(()=>{btn.textContent='📋 テキストをコピー';btn.classList.remove('copied');},2500);
    }
  });
}

function restart(){
  c1=null;c2=null;cur=0;a1=[];a2=[];sk=new Set();
  Object.keys(s1).forEach(k=>{s1[k]=0;s2[k]=0;});
  document.querySelectorAll('.ctx-btn').forEach(b=>b.classList.remove('sl'));
  document.getElementById('startBtn').disabled=true;
  document.getElementById('startBtn').textContent='2つの視点を選んではじめる';
  document.getElementById('resSec').classList.add('hidden');
  document.getElementById('resSec').innerHTML='';
  document.getElementById('topSec').classList.remove('hidden');
  const h=document.getElementById('topSec');
  h.style.animation='none';h.offsetHeight;h.style.animation='fu .6s ease both';
  window.scrollTo({top:0,behavior:'smooth'});
}
